## Stage 1 — Binary building segmentation
## Task: predict background (0) vs. building-present (1)
## Backbone: DeepLabV3+ MobileNetV2

data:
  data_root: "D:/IRDR0047/geotiffs"
  dataset_dir: "D:/IRDR0047/dataset"

model:
  num_classes: 2
  in_channels: 6              # pre+post concatenated
  pretrained_backbone: true

training:
  img_size: 512
  epochs: 40
  batch_size: 8
  lr: 1.0e-4
  weight_decay: 1.0e-4
  workers: 4
  use_class_weights: false
  # bg vs building — mild up-weight for buildings
  manual_class_weights: [1.0, 3.0]
  oversample_damage: 3        # building tiles 3× more likely sampled
  grad_clip: 1.0
  seed: 42
  checkpoint_dir: "D:/IRDR0047/weights/stage1"
  log_dir: "D:/IRDR0047/logs/stage1"

loss:
  ce_weight: 1.0
  dice_weight: 1.0
  focal_weight: 0.5
  focal_gamma: 2.0

augmentation:
  p_hflip: 0.5
  p_vflip: 0.5
  p_rotate90: 0.5
  p_color: 0.5
  p_noise: 0.3
  brightness_limit: 0.2
  contrast_limit: 0.2
  hue_shift_limit: 10
  sat_shift_limit: 20
  noise_std: 0.03

inference:
  checkpoint: "D:/IRDR0047/weights/stage1/best.pth"
  img_size: 512
